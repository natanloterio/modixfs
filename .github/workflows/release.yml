name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: livefolders
            asset: livefolders-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: livefolders
            asset: livefolders-linux-aarch64
            cross: true

          - target: aarch64-apple-darwin
            os: macos-14
            binary: livefolders
            asset: livefolders-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get install -y libfuse3-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install --cask macfuse
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## Install

            ### Linux (x86_64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/livefolders-linux-x86_64 -o livefolders
            chmod +x livefolders
            sudo mv livefolders /usr/local/bin/

            # Requires fuse3
            sudo apt-get install fuse3
            ```

            ### Linux (ARM64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/livefolders-linux-aarch64 -o livefolders
            chmod +x livefolders
            sudo mv livefolders /usr/local/bin/
            ```

            ### macOS
            ```bash
            # Install macFUSE first: https://osxfuse.github.io

            # Intel
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/livefolders-macos-x86_64 -o livefolders

            # Apple Silicon
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/livefolders-macos-aarch64 -o livefolders

            chmod +x livefolders
            sudo mv livefolders /usr/local/bin/
            ```

            ## Quick start
            ```bash
            livefolders init       # creates livefolders.yaml in current directory
            livefolders mount      # mounts at path defined in livefolders.yaml
            ```
