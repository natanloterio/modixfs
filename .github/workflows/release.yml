name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            asset: livefolders-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            asset: livefolders-linux-aarch64
          - target: aarch64-apple-darwin
            os: macos-14
            asset: livefolders-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Install fuse3 (Linux native)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse3-dev pkg-config

      - name: Install macFUSE (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask macfuse || true
          # macFUSE installs .pc files to /usr/local/lib/pkgconfig on both Intel and Apple Silicon
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/livefolders ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: livefolders-*
          generate_release_notes: true
