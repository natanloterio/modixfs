name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            asset: livefolders-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            asset: livefolders-linux-aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            asset: livefolders-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            asset: livefolders-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Install fuse3 (Linux native)
        if: matrix.os == 'ubuntu-22.04' && !matrix.use_cross
        run: sudo apt-get install -y libfuse3-dev pkg-config

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/livefolders ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: livefolders-*
          generate_release_notes: true
