<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" font-family="monospace, 'Courier New'" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2472c8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2d8a4e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c07818"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6655cc"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a8a90"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b83030"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="780" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">LiveFoldersFS — Architecture</text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#888">FUSE filesystem · tools as plain files · no protocol, no SDK</text>

  <!-- ── LLM Actor ── -->
  <rect x="30" y="76" width="140" height="60" rx="8" fill="#e8f0fb" stroke="#2472c8" stroke-width="1.5"/>
  <text x="100" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5fa8">LLM Agent</text>
  <text x="100" y="118" text-anchor="middle" font-size="10" fill="#4a6898">echo / cat</text>
  <text x="100" y="131" text-anchor="middle" font-size="10" fill="#4a6898">plain POSIX I/O</text>

  <!-- ── Kernel / FUSE ── -->
  <rect x="220" y="76" width="460" height="60" rx="8" fill="#ede8ff" stroke="#6655cc" stroke-width="1.5"/>
  <text x="450" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#4433aa">Kernel FUSE Layer</text>
  <text x="330" y="120" text-anchor="middle" font-size="10" fill="#5548aa">write() / release()</text>
  <text x="450" y="120" text-anchor="middle" font-size="10" fill="#aaa">·</text>
  <text x="570" y="120" text-anchor="middle" font-size="10" fill="#5548aa">read() · getattr() · readdir()</text>

  <!-- ── VFS Core ── -->
  <rect x="220" y="178" width="460" height="56" rx="8" fill="#e8e4ff" stroke="#7766dd" stroke-width="2"/>
  <text x="450" y="203" text-anchor="middle" font-size="13" font-weight="bold" fill="#3322aa">src/fs/vfs.rs  —  LiveFolders struct</text>
  <text x="450" y="221" text-anchor="middle" font-size="10" fill="#5544bb">write_buf · result_buf · trace_buf  (keyed by inode)   |   Tokio rt.block_on()</text>

  <!-- ── Inode / Registry row ── -->
  <rect x="220" y="278" width="210" height="52" rx="8" fill="#e6f5ee" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="325" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e6b38">src/fs/inode.rs</text>
  <text x="325" y="316" text-anchor="middle" font-size="10" fill="#2a6b42">1000–100000 built-ins</text>
  <text x="325" y="328" text-anchor="middle" font-size="10" fill="#2a6b42">≥ 100000 external</text>

  <rect x="470" y="278" width="210" height="52" rx="8" fill="#e6f5ee" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="575" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e6b38">src/registry/</text>
  <text x="575" y="316" text-anchor="middle" font-size="10" fill="#2a6b42">ToolRegistry  name→Arc&lt;dyn Tool&gt;</text>
  <text x="575" y="328" text-anchor="middle" font-size="10" fill="#2a6b42">Tool trait  ·  Session</text>

  <!-- ── Tools row ── -->
  <rect x="220" y="376" width="135" height="52" rx="8" fill="#fff4e5" stroke="#c07818" stroke-width="1.5"/>
  <text x="287" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#965a00">EchoTool</text>
  <text x="287" y="413" text-anchor="middle" font-size="10" fill="#7a4800">built-in smoke test</text>
  <text x="287" y="426" text-anchor="middle" font-size="10" fill="#7a4800">src/tools/echo.rs</text>

  <rect x="375" y="376" width="155" height="52" rx="8" fill="#fff4e5" stroke="#c07818" stroke-width="2"/>
  <text x="452" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#965a00">ExternalTool</text>
  <text x="452" y="413" text-anchor="middle" font-size="10" fill="#7a4800">loads folder.yaml</text>
  <text x="452" y="426" text-anchor="middle" font-size="10" fill="#7a4800">src/tools/external.rs</text>

  <rect x="550" y="376" width="130" height="52" rx="8" fill="#fff4e5" stroke="#c07818" stroke-width="1.5"/>
  <text x="615" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#965a00">Manifest</text>
  <text x="615" y="413" text-anchor="middle" font-size="10" fill="#7a4800">FileKind · InputSchema</text>
  <text x="615" y="426" text-anchor="middle" font-size="10" fill="#7a4800">src/manifest.rs</text>

  <!-- ── Sandbox ── -->
  <rect x="220" y="474" width="200" height="52" rx="8" fill="#fce8e8" stroke="#b83030" stroke-width="1.5"/>
  <text x="320" y="496" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b1a1a">src/sandbox/</text>
  <text x="320" y="511" text-anchor="middle" font-size="10" fill="#7a1a1a">Linux seccomp</text>
  <text x="320" y="524" text-anchor="middle" font-size="10" fill="#7a1a1a">macOS Seatbelt  ·  noop</text>

  <!-- ── Generated files ── -->
  <rect x="440" y="474" width="240" height="52" rx="8" fill="#e4f6f8" stroke="#1a8a90" stroke-width="1.5"/>
  <text x="560" y="496" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e6870">Generated (read-time)</text>
  <text x="560" y="511" text-anchor="middle" font-size="10" fill="#106060">how_to.md   src/fs/how_to_gen.rs</text>
  <text x="560" y="524" text-anchor="middle" font-size="10" fill="#106060">schema.json  src/fs/schema_gen.rs</text>

  <!-- ── Support services row ── -->
  <rect x="30" y="570" width="160" height="52" rx="8" fill="#f4f4f8" stroke="#bbb" stroke-width="1.2"/>
  <text x="110" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">Watcher</text>
  <text x="110" y="607" text-anchor="middle" font-size="10" fill="#777">notify hot-reload</text>
  <text x="110" y="619" text-anchor="middle" font-size="10" fill="#777">src/watcher.rs</text>

  <rect x="210" y="570" width="160" height="52" rx="8" fill="#f4f4f8" stroke="#bbb" stroke-width="1.2"/>
  <text x="290" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">Daemon</text>
  <text x="290" y="607" text-anchor="middle" font-size="10" fill="#777">fork · daemonize</text>
  <text x="290" y="619" text-anchor="middle" font-size="10" fill="#777">src/daemon.rs</text>

  <rect x="390" y="570" width="160" height="52" rx="8" fill="#f4f4f8" stroke="#bbb" stroke-width="1.2"/>
  <text x="470" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">Installer</text>
  <text x="470" y="607" text-anchor="middle" font-size="10" fill="#777">GitHub download</text>
  <text x="470" y="619" text-anchor="middle" font-size="10" fill="#777">src/installer.rs</text>

  <rect x="570" y="570" width="160" height="52" rx="8" fill="#f4f4f8" stroke="#bbb" stroke-width="1.2"/>
  <text x="650" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">Secrets / Config</text>
  <text x="650" y="607" text-anchor="middle" font-size="10" fill="#777">secrets.env  livefolders.yaml</text>
  <text x="650" y="619" text-anchor="middle" font-size="10" fill="#777">src/secrets.rs · config.rs</text>

  <rect x="750" y="570" width="120" height="52" rx="8" fill="#f4f4f8" stroke="#bbb" stroke-width="1.2"/>
  <text x="810" y="592" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">Doctor</text>
  <text x="810" y="607" text-anchor="middle" font-size="10" fill="#777">validate FUSE</text>
  <text x="810" y="619" text-anchor="middle" font-size="10" fill="#777">src/doctor.rs</text>

  <!-- ── Data flow label strip ── -->
  <rect x="30" y="680" width="840" height="82" rx="8" fill="#eef0f6" stroke="#ccc" stroke-width="1"/>
  <text x="50" y="700" font-size="11" font-weight="bold" fill="#555">Data flow</text>
  <text x="50" y="718" font-size="10" fill="#444">1. LLM  echo "input" &gt; .livefolders/tools/&lt;name&gt;/&lt;endpoint&gt;   →  FUSE write() accumulates in write_buf</text>
  <text x="50" y="733" font-size="10" fill="#444">2. fd closes  →  FUSE release()  →  ExternalTool spawns shell handler (stdin=input, sandboxed)  →  stores in result_buf</text>
  <text x="50" y="748" font-size="10" fill="#444">3. LLM  cat .livefolders/tools/&lt;name&gt;/&lt;endpoint&gt;   →  FUSE read()  →  drains result_buf  |  .log companion  →  trace_buf</text>
  <text x="50" y="763" font-size="10" fill="#2a6e3c" font-style="italic">read_invoke: invocation fires on read() instead of release()   |   state_file: flock serialises concurrent calls</text>

  <!-- ── Arrows: LLM → Kernel ── -->
  <line x1="170" y1="106" x2="218" y2="106" stroke="#2472c8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ── Kernel → VFS ── -->
  <line x1="450" y1="136" x2="450" y2="176" stroke="#6655cc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ── VFS → Inode ── -->
  <line x1="380" y1="234" x2="355" y2="276" stroke="#2d8a4e" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <!-- ── VFS → Registry ── -->
  <line x1="520" y1="234" x2="545" y2="276" stroke="#2d8a4e" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- ── Registry → Tools ── -->
  <line x1="500" y1="330" x2="380" y2="374" stroke="#c07818" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="540" y1="330" x2="452" y2="374" stroke="#c07818" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="590" y1="330" x2="610" y2="374" stroke="#c07818" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <!-- ── ExternalTool → Sandbox ── -->
  <line x1="420" y1="428" x2="360" y2="472" stroke="#b83030" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- ── ExternalTool → Manifest ── -->
  <line x1="530" y1="402" x2="550" y2="402" stroke="#c07818" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>

  <!-- ── Manifest → Generated ── -->
  <line x1="615" y1="428" x2="580" y2="472" stroke="#1a8a90" stroke-width="1.2" marker-end="url(#arrow-teal)"/>

  <!-- ── Watcher → Registry (dashed) ── -->
  <line x1="110" y1="570" x2="480" y2="336" stroke="#999" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ── Legend ── -->
  <line x1="720" y1="178" x2="755" y2="178" stroke="#2d8a4e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="760" y="182" font-size="10" fill="#2d8a4e">dispatch</text>
  <line x1="720" y1="194" x2="755" y2="194" stroke="#999" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="760" y="198" font-size="10" fill="#777">async/event</text>
  <line x1="720" y1="210" x2="755" y2="210" stroke="#2472c8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="760" y="214" font-size="10" fill="#2472c8">I/O</text>
</svg>
