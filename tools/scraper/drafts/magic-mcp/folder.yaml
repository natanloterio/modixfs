name: magic-mcp
description: AI-powered frontend UI component generation - like v0 but in your editor

mcp:
  server: magic-mcp
  command: npx
  args: ["-y", "@21st-dev/magic@latest"]

env:
  - name: TWENTY_FIRST_API_KEY
    description: API key for 21st.dev Magic MCP server
    secret: true
    required: true

files:
  - name: 21st_magic_component_builder
    type: write_invoke
    handler: livefolders mcp call magic-mcp 21st_magic_component_builder --arg message="$INPUT"
    input:
      type: string
      description: Describe the UI component you want to build (e.g. "a responsive navbar with dark mode toggle")

  - name: 21st_magic_component_inspiration
    type: write_invoke
    handler: livefolders mcp call magic-mcp 21st_magic_component_inspiration --arg search_query="$INPUT"
    input:
      type: string
      description: Search query to find UI component inspiration from 21st.dev library

  - name: 21st_magic_component_refiner
    type: write_invoke
    handler: livefolders mcp call magic-mcp 21st_magic_component_refiner --arg message="$INPUT"
    input:
      type: string
      description: Describe how you want to refine or update an existing UI component

  - name: logo_search
    type: write_invoke
    handler: livefolders mcp call magic-mcp logo_search --arg company_name="$INPUT"
    input:
      type: string
      description: Company or brand name to search for an SVG logo

  - name: how_to.md
    type: readonly
