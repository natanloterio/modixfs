name: gomcp
description: Lightpanda MCP server written in Go for browser automation and web scraping

mcp:
  server: gomcp
  command: npx
  args: ["-y", "gomcp"]

files:
  - name: navigate
    type: write_invoke
    handler: livefolders mcp call gomcp navigate --arg url="$INPUT"
    input:
      type: string
      description: URL to navigate to in the browser

  - name: screenshot
    type: write_invoke
    handler: livefolders mcp call gomcp screenshot --arg url="$INPUT"
    input:
      type: string
      description: URL to take a screenshot of

  - name: get_content
    type: write_invoke
    handler: livefolders mcp call gomcp get_content --arg url="$INPUT"
    input:
      type: string
      description: URL to fetch and extract content from

  - name: click
    type: write_invoke
    handler: livefolders mcp call gomcp click --arg selector="$INPUT"
    input:
      type: string
      description: CSS selector of the element to click

  - name: fill
    type: write_invoke
    handler: livefolders mcp call gomcp fill --arg selector="$INPUT"
    input:
      type: string
      description: CSS selector of the input field to fill

  - name: evaluate
    type: write_invoke
    handler: livefolders mcp call gomcp evaluate --arg script="$INPUT"
    input:
      type: string
      description: JavaScript code to evaluate in the browser context

  - name: get_html
    type: write_invoke
    handler: livefolders mcp call gomcp get_html --arg url="$INPUT"
    input:
      type: string
      description: URL to fetch and return raw HTML from

  - name: how_to.md
    type: readonly
