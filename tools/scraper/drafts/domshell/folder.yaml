name: domshell
description: AgenticShell - Browser DOM automation and interaction via MCP

mcp:
  server: domshell
  command: npx
  args: ["-y", "domshell"]

files:
  - name: navigate
    type: write_invoke
    handler: livefolders mcp call domshell navigate --arg url="$INPUT"
    input:
      type: string
      description: URL to navigate to in the browser

  - name: click
    type: write_invoke
    handler: livefolders mcp call domshell click --arg selector="$INPUT"
    input:
      type: string
      description: CSS selector of the element to click

  - name: type_text
    type: write_invoke
    handler: livefolders mcp call domshell type_text --arg selector="$INPUT"
    input:
      type: string
      description: CSS selector of the input element to type into

  - name: get_text
    type: write_invoke
    handler: livefolders mcp call domshell get_text --arg selector="$INPUT"
    input:
      type: string
      description: CSS selector of the element to retrieve text from

  - name: get_html
    type: write_invoke
    handler: livefolders mcp call domshell get_html --arg selector="$INPUT"
    input:
      type: string
      description: CSS selector of the element to retrieve HTML from

  - name: evaluate
    type: write_invoke
    handler: livefolders mcp call domshell evaluate --arg script="$INPUT"
    input:
      type: string
      description: JavaScript code to evaluate in the browser context

  - name: screenshot
    type: read_invoke
    handler: livefolders mcp call domshell screenshot

  - name: get_page_source
    type: read_invoke
    handler: livefolders mcp call domshell get_page_source

  - name: how_to.md
    type: readonly
