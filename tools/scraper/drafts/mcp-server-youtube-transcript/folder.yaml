name: mcp-server-youtube-transcript
description: Download transcripts of YouTube videos via the MCP YouTube Transcript server

mcp:
  server: mcp-server-youtube-transcript
  command: npx
  args: ["-y", "mcp-server-youtube-transcript"]

files:
  - name: get_transcript
    type: write_invoke
    handler: livefolders mcp call mcp-server-youtube-transcript get_transcript --arg url="$INPUT"
    input:
      type: string
      description: YouTube video URL or video ID to fetch the transcript for

  - name: how_to.md
    type: readonly
