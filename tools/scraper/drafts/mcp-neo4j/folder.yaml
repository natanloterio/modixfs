name: mcp-neo4j
description: Neo4j graph database operations via the MCP Neo4j server

mcp:
  server: mcp-neo4j
  command: npx
  args: ["-y", "mcp-neo4j-cypher"]

env:
  - name: NEO4J_URI
    description: Neo4j connection URI (e.g. bolt://localhost:7687)
    secret: false
    required: true
  - name: NEO4J_USERNAME
    description: Neo4j database username
    secret: false
    required: true
  - name: NEO4J_PASSWORD
    description: Neo4j database password
    secret: true
    required: true

files:
  - name: read_neo4j_schema
    type: read_invoke
    handler: livefolders mcp call mcp-neo4j get_neo4j_schema
    description: Retrieve the current Neo4j database schema including node labels, relationship types, and property keys

  - name: read_cypher_query
    type: write_invoke
    handler: livefolders mcp call mcp-neo4j read_neo4j_cypher --arg query="$INPUT"
    input:
      type: string
      description: A read-only Cypher query (MATCH, RETURN, etc.) to execute against the Neo4j database

  - name: write_cypher_query
    type: write_invoke
    handler: livefolders mcp call mcp-neo4j write_neo4j_cypher --arg query="$INPUT"
    input:
      type: string
      description: A write Cypher query (CREATE, MERGE, SET, DELETE, etc.) to execute against the Neo4j database

  - name: how_to.md
    type: readonly
    content: |
      # mcp-neo4j LiveFolder

      This folder wraps the [mcp-neo4j](https://github.com/neo4j-contrib/mcp-neo4j) MCP server,
      enabling natural language and direct interaction with a Neo4j graph database.

      ## Setup

      Set the following environment variables before using:

      | Variable        | Description                              |
      |-----------------|------------------------------------------|
      | NEO4J_URI       | Connection URI, e.g. `bolt://localhost:7687` |
      | NEO4J_USERNAME  | Database username (default: `neo4j`)     |
      | NEO4J_PASSWORD  | Database password                        |

      ## Available Tools

      ### `read_neo4j_schema`
      Fetches the database schema — node labels, relationship types, and property keys.
      No input required.

      ### `read_cypher_query`
      Executes a **read-only** Cypher query.

      **Example input:**
      ```
      MATCH (n:Person)-[:KNOWS]->(m:Person) RETURN n.name, m.name LIMIT 10
      ```

      ### `write_cypher_query`
      Executes a **write** Cypher query to create or modify graph data.

      **Example input:**
      ```
      CREATE (n:Person {name: "Alice", age: 30}) RETURN n
      ```

      ## Tips

      - Always inspect the schema first to understand your graph structure.
      - Use `read_cypher_query` for safe, non-destructive exploration.
      - Use `write_cypher_query` carefully — changes are persisted immediately.
      - Cypher is case-sensitive for property names but not for keywords.
