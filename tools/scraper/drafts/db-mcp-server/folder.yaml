name: db-mcp-server
description: Multi-database MCP server providing AI assistants with structured access to databases

mcp:
  server: db-mcp-server
  command: npx
  args: ["-y", "@freepeak/db-mcp-server"]

env:
  - name: DB_HOST
    description: Database host address
    secret: false
    required: true
  - name: DB_PORT
    description: Database port number
    secret: false
    required: true
  - name: DB_NAME
    description: Database name
    secret: false
    required: true
  - name: DB_USER
    description: Database username
    secret: false
    required: true
  - name: DB_PASSWORD
    description: Database password
    secret: true
    required: true
  - name: DB_TYPE
    description: Database type (mysql, postgres, sqlite, etc.)
    secret: false
    required: true

files:
  - name: execute_query
    type: write_invoke
    handler: livefolders mcp call db-mcp-server execute_query --arg query="$INPUT"
    input:
      type: string
      description: SQL query to execute against the database

  - name: list_tables
    type: read_invoke
    handler: livefolders mcp call db-mcp-server list_tables

  - name: describe_table
    type: write_invoke
    handler: livefolders mcp call db-mcp-server describe_table --arg table="$INPUT"
    input:
      type: string
      description: Table name to describe (schema, columns, types)

  - name: list_databases
    type: read_invoke
    handler: livefolders mcp call db-mcp-server list_databases

  - name: create_table
    type: write_invoke
    handler: livefolders mcp call db-mcp-server create_table --arg statement="$INPUT"
    input:
      type: string
      description: CREATE TABLE SQL statement to execute

  - name: insert_row
    type: write_invoke
    handler: livefolders mcp call db-mcp-server insert_row --arg statement="$INPUT"
    input:
      type: string
      description: INSERT INTO SQL statement to execute

  - name: update_row
    type: write_invoke
    handler: livefolders mcp call db-mcp-server update_row --arg statement="$INPUT"
    input:
      type: string
      description: UPDATE SQL statement to execute

  - name: delete_row
    type: write_invoke
    handler: livefolders mcp call db-mcp-server delete_row --arg statement="$INPUT"
    input:
      type: string
      description: DELETE SQL statement to execute

  - name: get_schema
    type: read_invoke
    handler: livefolders mcp call db-mcp-server get_schema

  - name: how_to.md
    type: readonly
