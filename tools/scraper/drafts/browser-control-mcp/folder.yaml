name: browser-control-mcp
description: Control your browser via AI agents using the browser-control-mcp server paired with a browser extension

mcp:
  server: browser-control-mcp
  command: npx
  args: ["-y", "browser-control-mcp"]

files:
  - name: get_open_tabs
    type: read_invoke
    handler: livefolders mcp call browser-control-mcp get_open_tabs
    description: Get a list of all currently open browser tabs

  - name: get_tab_content
    type: write_invoke
    handler: livefolders mcp call browser-control-mcp get_tab_content --arg tabId="$INPUT"
    input:
      type: string
      description: Tab ID to retrieve content from

  - name: navigate_to_url
    type: write_invoke
    handler: livefolders mcp call browser-control-mcp navigate_to_url --arg url="$INPUT"
    input:
      type: string
      description: URL to navigate to in the active browser tab

  - name: click_element
    type: write_invoke
    handler: livefolders mcp call browser-control-mcp click_element --arg selector="$INPUT"
    input:
      type: string
      description: CSS selector of the element to click

  - name: type_text
    type: write_invoke
    handler: livefolders mcp call browser-control-mcp type_text --arg text="$INPUT"
    input:
      type: string
      description: Text to type into the currently focused element

  - name: run_script
    type: write_invoke
    handler: livefolders mcp call browser-control-mcp run_script --arg script="$INPUT"
    input:
      type: string
      description: JavaScript code to execute in the context of the active tab

  - name: search_google
    type: write_invoke
    handler: livefolders mcp call browser-control-mcp search_google --arg query="$INPUT"
    input:
      type: string
      description: Search query to enter into Google

  - name: get_screenshot
    type: read_invoke
    handler: livefolders mcp call browser-control-mcp get_screenshot
    description: Take a screenshot of the current state of the active browser tab

  - name: scroll_page
    type: write_invoke
    handler: livefolders mcp call browser-control-mcp scroll_page --arg direction="$INPUT"
    input:
      type: string
      description: Direction to scroll the page (up or down)

  - name: go_back
    type: read_invoke
    handler: livefolders mcp call browser-control-mcp go_back
    description: Navigate back to the previous page in browser history

  - name: go_forward
    type: read_invoke
    handler: livefolders mcp call browser-control-mcp go_forward
    description: Navigate forward to the next page in browser history

  - name: how_to.md
    type: readonly
    content: |
      # browser-control-mcp

      This folder wraps the [browser-control-mcp](https://github.com/eyalzh/browser-control-mcp) MCP server,
      which lets AI agents control your browser through a companion browser extension.

      ## Prerequisites

      1. Install the browser extension from the repository:
         - Clone https://github.com/eyalzh/browser-control-mcp
         - Load the `extension/` folder as an unpacked extension in Chrome/Edge
         - Enable the extension and ensure it is connected (check the extension popup)

      2. The MCP server (`browser-control-mcp`) communicates with the extension over a local WebSocket.
         Make sure the extension is active before issuing any commands.

      ## Available Tools

      | File | Description |
      |------|-------------|
      | get_open_tabs | List all open browser tabs |
      | get_tab_content | Get the HTML/text content of a specific tab by ID |
      | navigate_to_url | Navigate the active tab to a given URL |
      | click_element | Click a DOM element identified by a CSS selector |
      | type_text | Type text into the focused input element |
      | run_script | Execute arbitrary JavaScript in the active tab |
      | search_google | Perform a Google search |
      | get_screenshot | Capture a screenshot of the active tab |
      | scroll_page | Scroll the active tab up or down |
      | go_back | Go back in browser history |
      | go_forward | Go forward in browser history |

      ## Notes

      - The browser extension must be installed and connected for any tool to work.
      - `run_script` is powerful but use with care — it executes arbitrary JS in your browser.
      - Screenshots are returned as base64-encoded image data.
