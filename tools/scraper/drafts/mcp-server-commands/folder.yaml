name: mcp-server-commands
description: Run shell commands and processes via the MCP server-commands server

mcp:
  server: mcp-server-commands
  command: npx
  args: ["-y", "mcp-server-commands"]

files:
  - name: run_process
    type: write_invoke
    handler: livefolders mcp call mcp-server-commands run_process --arg command="$INPUT"
    input:
      type: string
      description: Shell command to execute (e.g. "ls -la /tmp" or "echo hello world")

  - name: how_to.md
    type: readonly
