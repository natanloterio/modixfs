name: mcpmcp-server
description: Discover, setup, and integrate MCP servers with your favorite clients

mcp:
  server: mcpmcp-server
  command: npx
  args: ["-y", "mcpmcp-server"]

files:
  - name: list_servers
    type: read_invoke
    handler: livefolders mcp call mcpmcp-server list_servers
    description: List all available MCP servers in the registry

  - name: get_server
    type: write_invoke
    handler: livefolders mcp call mcpmcp-server get_server --arg name="$INPUT"
    input:
      type: string
      description: Name of the MCP server to retrieve details for

  - name: search_servers
    type: write_invoke
    handler: livefolders mcp call mcpmcp-server search_servers --arg query="$INPUT"
    input:
      type: string
      description: Search query to find relevant MCP servers

  - name: get_configuration
    type: write_invoke
    handler: livefolders mcp call mcpmcp-server get_configuration --arg name="$INPUT"
    input:
      type: string
      description: Name of the MCP server to get client configuration for

  - name: how_to.md
    type: readonly
