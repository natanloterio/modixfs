name: demo
description: Demonstrates all four LiveFolders file behavior types.

files:
  - name: shout
    type: write_invoke
    handler: "tr '[:lower:]' '[:upper:]'"

  - name: status
    type: read_invoke
    handler: "echo \"livefolders demo is running on $(hostname) at $(date)\""

  - name: notes.txt
    type: passthrough

  - name: how_to.md
    type: readonly

  - name: echo_json
    type: write_invoke
    handler: "python3 -c \"import sys,json; d=json.load(sys.stdin); print(json.dumps(d))\""
    input:
      type: json

  - name: ping
    type: read_invoke
    handler: "echo 'pong'"
    input:
      type: none
