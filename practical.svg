<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="monospace, 'Courier New'" font-size="12">
  <defs>
    <marker id="arrow"        markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#666"/></marker>
    <marker id="arrow-blue"   markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2472c8"/></marker>
    <marker id="arrow-green"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2d8a4e"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#c07818"/></marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6655cc"/></marker>
    <marker id="arrow-teal"   markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1a8a90"/></marker>
    <marker id="arrow-back"   markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0, 0 3, 8 6" fill="#2d8a4e"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">LiveFoldersFS — How it works in practice</text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#888">weather-tool walkthrough · write to invoke · read to collect · no protocol, no SDK</text>

  <!-- ── Swimlane headers ── -->
  <rect x="30"  y="66" width="218" height="38" rx="6" fill="#e8f0fb" stroke="#2472c8" stroke-width="1.5"/>
  <text x="139" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5fa8">LLM Agent</text>
  <text x="139" y="100" text-anchor="middle" font-size="9"  fill="#4a6898">echo · cat · POSIX I/O</text>

  <rect x="262" y="66" width="330" height="38" rx="6" fill="#ede8ff" stroke="#6655cc" stroke-width="1.5"/>
  <text x="427" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#4433aa">FUSE / LiveFolders  (vfs.rs)</text>
  <text x="427" y="100" text-anchor="middle" font-size="9"  fill="#5548aa">write_buf · result_buf · trace_buf · Tokio</text>

  <rect x="606" y="66" width="264" height="38" rx="6" fill="#fff4e5" stroke="#c07818" stroke-width="1.5"/>
  <text x="738" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#965a00">Shell Handler</text>
  <text x="738" y="100" text-anchor="middle" font-size="9"  fill="#7a4800">folder.yaml · subprocess</text>

  <!-- Vertical lane guide lines -->
  <line x1="139" y1="104" x2="139" y2="466" stroke="#2472c8" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.35"/>
  <line x1="427" y1="104" x2="427" y2="466" stroke="#6655cc" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.35"/>
  <line x1="738" y1="104" x2="738" y2="466" stroke="#c07818" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.35"/>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 1 — Discover -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="19" cy="129" r="10" fill="#2472c8"/>
  <text x="19" y="134" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1</text>

  <!-- LLM command box -->
  <rect x="30" y="112" width="218" height="38" rx="5" fill="#1e1e2e"/>
  <text x="42" y="127" font-size="9" fill="#569cd6">$</text>
  <text x="52" y="127" font-size="9" fill="#d4d4d4">cat .livefolders/tools/index.md</text>
  <text x="42" y="143" font-size="9" fill="#6a9955"># list available tools</text>

  <!-- Arrow: LLM → FUSE -->
  <line x1="248" y1="131" x2="260" y2="131" stroke="#2472c8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- FUSE box -->
  <rect x="262" y="112" width="330" height="38" rx="5" fill="#e8e4ff" stroke="#7766dd" stroke-width="1"/>
  <text x="427" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#4433aa">readdir()  →  synthetic  index.md</text>
  <text x="427" y="143" text-anchor="middle" font-size="9"  fill="#5544bb">returns registered tool names &amp; descriptions</text>

  <!-- Handler: n/a -->
  <rect x="606" y="118" width="264" height="26" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="738" y="135" text-anchor="middle" font-size="9" fill="#bbb">— not involved —</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 2 — Learn usage -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="19" cy="183" r="10" fill="#2472c8"/>
  <text x="19" y="188" text-anchor="middle" font-size="10" font-weight="bold" fill="white">2</text>

  <rect x="30" y="166" width="218" height="40" rx="5" fill="#1e1e2e"/>
  <text x="42" y="181" font-size="9" fill="#569cd6">$</text>
  <text x="52" y="181" font-size="9" fill="#d4d4d4">cat .livefolders/tools/</text>
  <text x="52" y="198" font-size="9" fill="#d4d4d4">    weather/how_to.md</text>

  <line x1="248" y1="185" x2="260" y2="185" stroke="#2472c8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="262" y="166" width="330" height="40" rx="5" fill="#e8e4ff" stroke="#7766dd" stroke-width="1"/>
  <text x="427" y="182" text-anchor="middle" font-size="10" font-weight="bold" fill="#4433aa">read()  →  how_to_gen.rs</text>
  <text x="427" y="196" text-anchor="middle" font-size="9"  fill="#5544bb">Markdown built from folder.yaml at read time</text>
  <text x="427" y="208" text-anchor="middle" font-size="9"  fill="#5544bb">never written to disk</text>

  <rect x="606" y="172" width="264" height="28" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="738" y="190" text-anchor="middle" font-size="9" fill="#bbb">— not involved —</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 3 — Write input -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="19" cy="239" r="10" fill="#2472c8"/>
  <text x="19" y="244" text-anchor="middle" font-size="10" font-weight="bold" fill="white">3</text>

  <rect x="30" y="222" width="218" height="44" rx="5" fill="#1e1e2e"/>
  <text x="42" y="237" font-size="9" fill="#569cd6">$</text>
  <text x="52" y="237" font-size="9" fill="#ce9178">"London"</text>
  <text x="52" y="251" font-size="9" fill="#d4d4d4">  &gt; .livefolders/tools/</text>
  <text x="52" y="262" font-size="9" fill="#d4d4d4">      weather/forecast</text>

  <line x1="248" y1="243" x2="260" y2="243" stroke="#2472c8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="262" y="222" width="330" height="44" rx="5" fill="#e8e4ff" stroke="#7766dd" stroke-width="1"/>
  <text x="427" y="238" text-anchor="middle" font-size="10" font-weight="bold" fill="#4433aa">write()  →  write_buf[inode] += bytes</text>
  <text x="427" y="252" text-anchor="middle" font-size="9"  fill="#5544bb">fd still open → buffering in memory</text>
  <text x="427" y="264" text-anchor="middle" font-size="9"  fill="#5544bb">release() will fire once the fd closes</text>

  <rect x="606" y="230" width="264" height="28" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="738" y="249" text-anchor="middle" font-size="9" fill="#bbb">— not yet spawned —</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 4 — Invoke handler  (tallest) -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="19" cy="303" r="10" fill="#6655cc"/>
  <text x="19" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="white">4</text>

  <!-- Left: fd-close note -->
  <rect x="30" y="284" width="218" height="78" rx="5" fill="#ede8ff" stroke="#9988ee" stroke-width="1"/>
  <text x="139" y="301" text-anchor="middle" font-size="10" font-weight="bold" fill="#4433aa">fd closes</text>
  <text x="139" y="315" text-anchor="middle" font-size="9"  fill="#5544bb">shell redirect closes fd</text>
  <text x="139" y="328" text-anchor="middle" font-size="9"  fill="#5544bb">automatically after write</text>
  <text x="139" y="346" text-anchor="middle" font-size="9"  fill="#7766cc">kernel delivers release()</text>
  <text x="139" y="358" text-anchor="middle" font-size="9"  fill="#7766cc">to FUSE driver</text>

  <!-- Arrow: LLM event → FUSE -->
  <line x1="248" y1="323" x2="260" y2="323" stroke="#6655cc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- FUSE box -->
  <rect x="262" y="284" width="330" height="78" rx="5" fill="#e8e4ff" stroke="#7766dd" stroke-width="1.5"/>
  <text x="427" y="301" text-anchor="middle" font-size="10" font-weight="bold" fill="#4433aa">release()  →  ExternalTool::invoke()</text>
  <text x="427" y="315" text-anchor="middle" font-size="9"  fill="#5544bb">rt.block_on(async { spawn handler })</text>
  <text x="427" y="329" text-anchor="middle" font-size="9"  fill="#5544bb">stdin  ←  write_buf  |  timeout guard</text>
  <text x="427" y="343" text-anchor="middle" font-size="9"  fill="#5544bb">state_file → flock() before spawn</text>
  <text x="427" y="358" text-anchor="middle" font-size="9"  fill="#1e6b38" font-weight="bold">result_buf[inode] ← handler stdout</text>

  <!-- Arrow: FUSE → Handler (spawn) -->
  <line x1="592" y1="310" x2="604" y2="310" stroke="#c07818" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- Arrow: Handler → FUSE (result) -->
  <line x1="604" y1="346" x2="592" y2="346" stroke="#2d8a4e" stroke-width="1.2" marker-end="url(#arrow-back)"/>

  <!-- Handler box -->
  <rect x="606" y="284" width="264" height="78" rx="5" fill="#fff4e5" stroke="#c07818" stroke-width="1.5"/>
  <text x="738" y="301" text-anchor="middle" font-size="11" font-weight="bold" fill="#965a00">handler.sh</text>
  <text x="738" y="315" text-anchor="middle" font-size="9"  fill="#7a4800">stdin  ←  "London"</text>
  <text x="738" y="329" text-anchor="middle" font-size="9"  fill="#7a4800">calls external API</text>
  <text x="738" y="343" text-anchor="middle" font-size="9"  fill="#2a6b42">stdout →  "Sunny, 22 °C"</text>
  <text x="738" y="358" text-anchor="middle" font-size="9"  fill="#7a6800">exit 0  |  stderr → trace</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 5 — Read result -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="19" cy="386" r="10" fill="#2d8a4e"/>
  <text x="19" y="391" text-anchor="middle" font-size="10" font-weight="bold" fill="white">5</text>

  <rect x="30" y="370" width="218" height="40" rx="5" fill="#1e1e2e"/>
  <text x="42" y="385" font-size="9" fill="#569cd6">$</text>
  <text x="52" y="385" font-size="9" fill="#d4d4d4">cat .livefolders/tools/</text>
  <text x="52" y="398" font-size="9" fill="#d4d4d4">    weather/forecast</text>
  <!-- result shown -->
  <text x="52" y="407" font-size="9" fill="#4ec9b0">Sunny, 22 °C</text>

  <line x1="248" y1="388" x2="260" y2="388" stroke="#2d8a4e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="262" y="370" width="330" height="40" rx="5" fill="#e6f5ee" stroke="#2d8a4e" stroke-width="1"/>
  <text x="427" y="386" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e6b38">read()  →  drains result_buf[inode]</text>
  <text x="427" y="400" text-anchor="middle" font-size="9"  fill="#2a6b42">returns handler stdout · clears buffer</text>

  <rect x="606" y="376" width="264" height="28" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="738" y="395" text-anchor="middle" font-size="9" fill="#bbb">— already exited —</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- STEP 6 — Read trace log -->
  <!-- ─────────────────────────────────────────────────────── -->
  <circle cx="19" cy="432" r="10" fill="#1a8a90"/>
  <text x="19" y="437" text-anchor="middle" font-size="10" font-weight="bold" fill="white">6</text>

  <rect x="30" y="418" width="218" height="38" rx="5" fill="#1e1e2e"/>
  <text x="42" y="433" font-size="9" fill="#569cd6">$</text>
  <text x="52" y="433" font-size="9" fill="#d4d4d4">cat .livefolders/tools/</text>
  <text x="52" y="447" font-size="9" fill="#d4d4d4">    weather/forecast.log</text>

  <line x1="248" y1="436" x2="260" y2="436" stroke="#1a8a90" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

  <rect x="262" y="418" width="330" height="38" rx="5" fill="#e4f6f8" stroke="#1a8a90" stroke-width="1"/>
  <text x="427" y="434" text-anchor="middle" font-size="10" font-weight="bold" fill="#0e6870">read()  →  drains trace_buf[inode]</text>
  <text x="427" y="448" text-anchor="middle" font-size="9"  fill="#106060">duration_ms: 142   exit: 0   stderr: (empty)</text>

  <rect x="606" y="424" width="264" height="26" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="738" y="441" text-anchor="middle" font-size="9" fill="#bbb">— trace written on exit —</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- TOOL DEFINITION — folder.yaml -->
  <!-- ─────────────────────────────────────────────────────── -->
  <rect x="30" y="472" width="840" height="138" rx="8" fill="#eef0f6" stroke="#ccc" stroke-width="1"/>
  <text x="50" y="492" font-size="11" font-weight="bold" fill="#555">Tool definition  —  tools/weather/folder.yaml</text>

  <!-- YAML source (left half) -->
  <text x="50" y="510" font-size="10" fill="#c586c0">name:</text>
  <text x="90" y="510" font-size="10" fill="#ce9178">weather</text>
  <text x="50" y="524" font-size="10" fill="#c586c0">files:</text>
  <text x="60" y="538" font-size="10" fill="#569cd6">- name:</text>
  <text x="108" y="538" font-size="10" fill="#ce9178">forecast</text>
  <text x="170" y="538" font-size="10" fill="#569cd6">type:</text>
  <text x="198" y="538" font-size="10" fill="#4ec9b0">write_invoke</text>
  <text x="275" y="538" font-size="10" fill="#569cd6">handler:</text>
  <text x="325" y="538" font-size="10" fill="#ce9178">./handler.sh</text>
  <text x="60" y="552" font-size="10" fill="#569cd6">  input:</text>
  <text x="108" y="552" font-size="10" fill="#d4d4d4">{ type: string, description: "city name" }</text>
  <text x="50" y="566" font-size="10" fill="#c586c0">env:</text>
  <text x="60" y="580" font-size="10" fill="#569cd6">- name:</text>
  <text x="108" y="580" font-size="10" fill="#ce9178">WEATHER_API_KEY</text>
  <text x="240" y="580" font-size="10" fill="#569cd6">secret:</text>
  <text x="278" y="580" font-size="10" fill="#4ec9b0">true</text>
  <text x="60" y="594" font-size="10" fill="#569cd6">  description:</text>
  <text x="145" y="594" font-size="10" fill="#ce9178">"API key for weather provider"</text>

  <!-- What this creates (right half) -->
  <line x1="430" y1="480" x2="430" y2="600" stroke="#ccc" stroke-width="1"/>
  <text x="448" y="510" font-size="10" fill="#555" font-weight="bold">Creates in the filesystem:</text>
  <text x="448" y="526" font-size="10" fill="#2472c8">→  .livefolders/tools/weather/forecast</text>
  <text x="448" y="540" font-size="10" fill="#1a8a90">→  .livefolders/tools/weather/forecast.log</text>
  <text x="448" y="554" font-size="10" fill="#1a8a90">→  .livefolders/tools/weather/how_to.md   (generated)</text>
  <text x="448" y="568" font-size="10" fill="#1a8a90">→  .livefolders/tools/weather/schema.json  (generated)</text>
  <text x="448" y="584" font-size="10" fill="#c07818">→  prompts for WEATHER_API_KEY at install</text>
  <text x="448" y="598" font-size="10" fill="#777" font-style="italic">stored in  ~/.config/livefolders/secrets.env</text>

  <!-- ─────────────────────────────────────────────────────── -->
  <!-- VARIANTS note -->
  <!-- ─────────────────────────────────────────────────────── -->
  <rect x="30" y="620" width="840" height="46" rx="6" fill="#fff8e8" stroke="#ddb040" stroke-width="1"/>
  <text x="50" y="637" font-size="10" fill="#7a4800"><tspan font-weight="bold">Variant — read_invoke:</tspan>  type: read_invoke  →  invocation fires on  read()  instead of  release()  (good for polling / side-effect-free queries)</text>
  <text x="50" y="655" font-size="10" fill="#7a4800"><tspan font-weight="bold">Variant — state_file:</tspan>   state_file: ./state.json  →  exclusive flock() before handler runs, serialising concurrent calls to the same endpoint</text>

  <!-- Legend -->
  <line x1="720" y1="130" x2="750" y2="130" stroke="#2472c8" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="755" y="134" font-size="10" fill="#2472c8">LLM I/O</text>
  <line x1="720" y1="146" x2="750" y2="146" stroke="#6655cc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="755" y="150" font-size="10" fill="#6655cc">FUSE event</text>
  <line x1="720" y1="162" x2="750" y2="162" stroke="#c07818" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="755" y="166" font-size="10" fill="#c07818">spawn</text>
  <line x1="720" y1="178" x2="750" y2="178" stroke="#2d8a4e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="755" y="182" font-size="10" fill="#2d8a4e">result</text>
  <line x1="720" y1="194" x2="750" y2="194" stroke="#1a8a90" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="755" y="198" font-size="10" fill="#1a8a90">trace</text>
</svg>
